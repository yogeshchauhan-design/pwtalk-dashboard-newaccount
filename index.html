}

// ── AGGREGATION ───────────────────────────────────────────────
function agg(rows){
  const s={impressions:0,clicks:0,installs:0,cost:0,signups:0,trials:0,autopays:0,d0:0,d7:0,d14:0,d28:0};
  rows.forEach(r=>{
    s.impressions+=r.impressions;s.clicks+=r.clicks;s.installs+=r.installs;
    s.cost+=r.cost;s.signups+=r.signups;s.trials+=r.trials;s.autopays+=r.autopays;
    s.d0+=r.d0;s.d7+=r.d7;s.d14+=r.d14;s.d28+=r.d28;
  });
  return calc(s);
}

function calc(s){
  const m={...s};
  m.cpm=s.impressions>0?(s.cost/s.impressions*1000):0;
  m.cpc=s.clicks>0?(s.cost/s.clicks):0;
  m.ctr=s.impressions>0?(s.clicks/s.impressions*100):0;
  m.c2i=s.clicks>0?(s.installs/s.clicks*100):0;
  m.i2s=s.installs>0?(s.signups/s.installs*100):0;
  m.s2t=s.signups>0?(s.trials/s.signups*100):0;
  m.apr=s.trials>0?(s.autopays/s.trials*100):0;
  // CPT current cohorts
  m.cpt=s.trials>0?s.cost/s.trials:0;
  m.cpt_d0=s.d0>0?s.cost/s.d0:0;
  m.cpt_d7=s.d7>0?s.cost/s.d7:0;
  m.cpt_d14=s.d14>0?s.cost/s.d14:0;
  m.cpt_d28=s.d28>0?s.cost/s.d28:0;
  // CPT estimated (from D0 base)
  m.est_d0=s.d0>0?s.cost/s.d0:0;
  m.est_d7=s.d0>0?s.cost/(s.d0*EST.d7):0;
  m.est_d14=s.d0>0?s.cost/(s.d0*EST.d14):0;
  m.est_d28=s.d0>0?s.cost/(s.d0*EST.d28):0;
  // CAC
  m.cac=s.autopays>0?s.cost/s.autopays:null;
  const apr_r=s.trials>0?s.autopays/s.trials:0;
  m.est_cac_d0=apr_r>0&&m.est_d0>0?m.est_d0/apr_r:null;
  m.est_cac_d7=apr_r>0&&m.est_d7>0?m.est_d7/apr_r:null;
  m.est_cac_d14=apr_r>0&&m.est_d14>0?m.est_d14/apr_r:null;
  m.est_cac_d28=apr_r>0&&m.est_d28>0?m.est_d28/apr_r:null;
  return m;
}

// ── COLOR ──────────────────────────────────────────────────────
function cls(val,g,a,hiGood){
  if(hiGood){return val>=g?'green':val>=a?'amber':'red';}
  else{return val<=g?'green':val<=a?'amber':'red';}
}
function pill(val,g,a,hiGood,fmt){return `<span class="pill ${cls(val,g,a,hiGood)}">${fmt}</span>`;}

// ── FORMAT ─────────────────────────────────────────────────────
function fmtC(n){return n>0?'₹'+n.toFixed(0):'—';}
function fmtN(n){if(!n)return'0';if(n>=100000)return(n/100000).toFixed(1)+'L';if(n>=1000)return(n/1000).toFixed(1)+'K';return Math.round(n).toString();}
function fmtP(n){return n.toFixed(1)+'%';}
function tr(str,n){return str&&str.length>n?str.substring(0,n)+'…':(str||'—');}
function groupBy(arr,key){return arr.reduce((a,r)=>{const k=r[key]||'?';if(!a[k])a[k]=[];a[k].push(r);return a;},{});}

// ── TREND DELTA ────────────────────────────────────────────────
function delta(curr,prev,hiGood){
  if(!prev||prev===0) return '';
  const pct=((curr-prev)/prev*100).toFixed(1);
  const up=parseFloat(pct)>0;
  const good=hiGood?up:!up;
  const cls=good?'trend-up-good':'trend-up-bad';
  return `<div class="${up?cls:good?'trend-down-good':'trend-down-bad'}">${up?'↑':'↓'}${Math.abs(pct)}%</div>`;
}

// ── FLAGS ──────────────────────────────────────────────────────
function flags(m,label){
  const f=[];
  if(m.ctr<T.ctr.a) f.push({t:m.ctr<T.ctr.a/2?'red':'amber',msg:`${label}: CTR ${m.ctr.toFixed(2)}% — hook underperforming`});
  if(m.cpm>T.cpm.a) f.push({t:'red',msg:`${label}: CPM ₹${m.cpm.toFixed(0)} — above ₹30 threshold`});
  if(m.cpt>0&&m.cpt>T.cpt.a) f.push({t:m.cpt>200?'red':'amber',msg:`${label}: CPT ₹${m.cpt.toFixed(0)} — above ₹150 target`});
  if(m.c2i<T.c2i.a) f.push({t:'amber',msg:`${label}: Click→Install ${m.c2i.toFixed(1)}% — low`});
  if(m.i2s<T.i2s.a) f.push({t:'amber',msg:`${label}: Install→Signup ${m.i2s.toFixed(1)}% — below 50%`});
  if(m.s2t<T.s2t.a&&m.signups>5) f.push({t:'amber',msg:`${label}: Signup→Trial ${m.s2t.toFixed(1)}% — below 10%`});
  if(m.cost>200&&m.installs===0) f.push({t:'red',msg:`${label}: Spend ₹${m.cost.toFixed(0)} with 0 installs`});
  if(m.cost>300&&m.trials===0&&m.installs>5) f.push({t:'amber',msg:`${label}: No trials yet`});
  return f;
}

        <tr><td>Est D14</td><td><span class="pill early">—</span></td></tr>
        <tr><td>Est D28</td><td><span class="pill early">—</span></td></tr>
      </tbody></table>
    </div>
  </div></div>`;
}

// ── TRENDS ────────────────────────────────────────────────────
function renderTrendsView(){
  const el=document.getElementById('view-trends');
  const METRICS=[
    {key:'cost',label:'Spend ₹',fmt:v=>'₹'+v.toFixed(0),hiGood:false},
    {key:'installs',label:'Installs',fmt:v=>fmtN(v),hiGood:true},
    {key:'trials',label:'Trials',fmt:v=>fmtN(v),hiGood:true},
    {key:'ctr',label:'CTR%',fmt:v=>v.toFixed(2)+'%',hiGood:true},
    {key:'cpm',label:'CPM ₹',fmt:v=>'₹'+v.toFixed(1),hiGood:false},
    {key:'c2i',label:'C→I%',fmt:v=>v.toFixed(1)+'%',hiGood:true},
    {key:'i2s',label:'I→S%',fmt:v=>v.toFixed(1)+'%',hiGood:true},
    {key:'s2t',label:'S→T%',fmt:v=>v.toFixed(1)+'%',hiGood:true},
    {key:'cpt',label:'CPT',fmt:v=>v>0?'₹'+v.toFixed(0):'—',hiGood:false},
    {key:'est_d28',label:'Est CPT D28',fmt:v=>v>0?'₹'+v.toFixed(0):'—',hiGood:false},
  ];

  const d9=ALL_ROWS.filter(r=>r.date==='2026-06-09'&&(campFilter==='all'||META.ads[r.ad_id]?.campaign_id===campFilter));
  const d10=ALL_ROWS.filter(r=>r.date==='2026-06-10'&&(campFilter==='all'||META.ads[r.ad_id]?.campaign_id===campFilter));
  const m9=agg(d9),m10=agg(d10);

  let h=`<div class="section-header"><div class="section-title">Day-on-Day Trends</div></div>
  <div class="table-wrap"><div style="overflow-x:auto;"><table><thead><tr>
    <th>Metric</th><th>9 Jun 2026</th><th>10 Jun 2026</th><th>DoD Change</th>
  </tr></thead><tbody>`;

  METRICS.forEach(met=>{
    const v9=m9[met.key]||0,v10=m10[met.key]||0;
    const pct=v9>0?((v10-v9)/v9*100):null;
    const up=pct!==null&&pct>0;
    const good=met.hiGood?up:!up;
    const chgHtml=pct!==null?`<span style="color:${good?'var(--green)':'var(--red)'};">${up?'↑':'↓'}${Math.abs(pct).toFixed(1)}%</span>`:'—';
    h+=`<tr>
      <td style="font-weight:500;color:var(--text2);">${met.label}</td>
      <td style="font-family:var(--mono);">${met.fmt(v9)}</td>
      <td style="font-family:var(--mono);">${met.fmt(v10)}</td>
      <td>${chgHtml}</td>
    </tr>`;
  });

  h+=`</tbody></table></div></div>
  <div style="margin-top:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;">
    <div style="font-size:11px;color:var(--text3);line-height:1.8;">
      <strong style="color:var(--text2);">WoW / MoM trends</strong> — Not yet available. Need 7+ days of data for WoW and 30+ days for MoM. 
      These will auto-populate as you upload daily CSVs.<br>
      <strong style="color:var(--text2);">Current data window:</strong> Jun 9–10, 2026 (2 days)
    </div>
  </div>`;

  el.innerHTML=h;
}

// ── INTERACTIONS ──────────────────────────────────────────────
function toggleExp(tableId,id){
  const row=document.getElementById(`exp-${tableId}-${id}`);
  const tog=document.getElementById(`et-${tableId}-${id}`);
  if(!row)return;
  const open=row.style.display!=='none';
  row.style.display=open?'none':'table-row';
  tog.classList.toggle('open',!open);
}

function filterTbl(val,tableId){
  const tbody=document.getElementById('tbody-'+tableId);
  if(!tbody)return;
  tbody.querySelectorAll('tr.data-row').forEach(row=>{
    const txt=row.querySelector('.name-cell')?.textContent?.toLowerCase()||'';
    const show=!val||txt.includes(val.toLowerCase());
    row.style.display=show?'':'none';
    const next=row.nextElementSibling;
    if(next?.classList.contains('expand-row')) next.style.display='none';
  });
}

// ── CSV UPLOAD (live update) ──────────────────────────────────
document.getElementById('csvUpload').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const lines=ev.target.result.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.trim());
    const gi=(h)=>headers.indexOf(h);
    const newRows=[];
    for(let i=1;i<lines.length;i++){
      const v=lines[i].split(',');if(v.length<6)continue;
      const n=(idx)=>{const x=parseFloat(v[idx]?.trim());return isNaN(x)?0:x;};
      newRows.push({
        ad_id:v[gi('Ad ID')]?.trim(),date:v[gi('Date')]?.trim(),
        impressions:n(gi('Impressions')),clicks:n(gi('Clicks')),
        installs:n(gi('Installs appsflyer')),cost:n(gi('Cost')),
        signups:n(gi('Unique users ltv days cumulative appsflyer signed_up')),
        trials:n(gi('Unique users ltv days cumulative appsflyer trial_started')),
        autopays:n(gi('Unique users ltv days cumulative appsflyer sub_amt_deducted')),
        d0:n(gi('Unique users 0 days cumulative appsflyer trial_started')),
        d7:n(gi('Unique users 6 days cumulative appsflyer trial_started')),
        d14:n(gi('Unique users 13 days cumulative appsflyer trial_started')),
        d28:n(gi('Unique users 27 days cumulative appsflyer trial_started')),
      });
    }
    ALL_ROWS=newRows;
    const dates=newRows.map(r=>r.date).filter(Boolean).sort();
    if(dates.length){dateFrom=dates[0];dateTo=dates[dates.length-1];}
    document.getElementById('dateFrom').value=dateFrom;
    document.getElementById('dateTo').value=dateTo;
    document.getElementById('lastUpdated').textContent='Updated: '+new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    e.target.value='';
    render();
  };
  reader.readAsText(file);
});

document.getElementById('dateFrom').addEventListener('change',function(){dateFrom=this.value;render();});
document.getElementById('dateTo').addEventListener('change',function(){dateTo=this.value;render();});

setView('overview');
